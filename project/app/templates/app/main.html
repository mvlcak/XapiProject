{%  include 'app/head.html' %}
<body>
   
    {%  include 'app/navbar.html' %}
    <div class="container">
  <div class="row">
    <div class="col">
     <h3> Persons:</h3>
    </div>
    <div class="col">
      <h3>
     {{personCount}}
     </h3>
    </div>
  </div>
  <div class="row">
    <div class="col">
      <h3>Activities:</h3>
    </div>
    <div class="col">
      <h3>{{activityCount}}</h3>
     </div>
  </div>
  <div class="row">
    <div class="col">
      <div>
        <canvas id="bar-chart" width="33%" height="33%"></canvas>
      </div>
    </div>
    <div class="col">
      <canvas id="line-chart"  width="33%" height="33%"></canvas>
    </div>
    <div class="col">
      <canvas id="bar-chart3" width="33%" height="33%"></canvas>
    </div>
  </div>
</div>
<div class="row">
  <div class="col" id="id1">
    <h3>Last activities</h3>
   
  {% for activity in lastActivities %}
        
            <a href="{% url 'detailPerson' activity.person.id %}">{{activity.actor}}</a>
            {{activity.verb}}
            {{activity.object}}
            {{activity.timestamp}}
        <br>
    {% endfor %}
      
   
  </div>
 
</div>
    <script>
      new Chart(document.getElementById("bar-chart"), {
          type: 'bar',
          data: {
            labels:  [{% for pers in personsInteractions %}"{{pers.0}}", {% endfor %}],
            datasets: [
              {
                label: "Interactions",
                backgroundColor: [{% for pers in personsInteractions %}"#c45850", {% endfor %} ],
                data: [{% for pers in personsInteractions %} {{pers.1}} , {% endfor %}]
              }
            ]
          },
          options: {
            legend: { display: false },
            title: {
              display: true,
              text: ''
            }
          }
      });
      
      new Chart(document.getElementById("line-chart"), {
        type: 'line',
        data: {
          labels: [1500,1600,1700,1750,1800,1850,1900,1950,1999,2050],
          datasets: [{ 
              data: [86,114,106,106,107,111,133,221,783,2478],
              label: "Africa",
              borderColor: "#3e95cd",
              fill: false
            }, { 
              data: [282,350,411,502,635,809,947,1402,3700,5267],
              label: "Asia",
              borderColor: "#8e5ea2",
              fill: false
            }, { 
              data: [168,170,178,190,203,276,408,547,675,734],
              label: "Europe",
              borderColor: "#3cba9f",
              fill: false
            }, { 
              data: [40,20,10,16,24,38,74,167,508,784],
              label: "Latin America",
              borderColor: "#e8c3b9",
              fill: false
            }, { 
              data: [6,3,2,2,7,26,82,172,312,433],
              label: "North America",
              borderColor: "#c45850",
              fill: false
            }
          ]
        },
        options: {
          title: {
            display: true,
            text: 'World population per region (in millions)'
          }
        }
      });
      new Chart(document.getElementById("bar-chart3"), {
          type: 'bar',
          data: {
            labels:  [{% for act in activitiesInteractions %}"{{act.0}}", {% endfor %}],
            datasets: [
              {
                label: "Interactions",
                backgroundColor: [{% for act in activitiesInteractions %}"#c45850", {% endfor %} ],
                data: [{% for act in activitiesInteractions %} {{act.1}} , {% endfor %}]
              }
            ]
          },
          options: {
            legend: { display: false },
            title: {
              display: true,
              text: 'Predicted world population (millions) in 2050'
            }
          }
      });
    </script>
</body>
</html>
